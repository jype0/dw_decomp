name: dget
sha1: 10d65e067c5ae0dd4cff78da8cf8d0965ab4224c
options:
  basename: dget
  target_path: disks/us/DGET_REL.BIN
  base_path: ..
  platform: psx
  compiler: PSYQ

  asm_path: asm/dget
  src_path: src/dget
  build_path: build

  ld_script_path: build/generated/dget.ld

  global_vram_start: 0x80000000
  global_vram_end: 0x80200000

  find_file_boundaries: True
  gp_value: 0x8013BB2C

  generate_asm_macros_files: False

  section_order: [".text", ".rodata", ".data", ".sdata", ".sbss", ".bss"]

  symbol_addrs_path:
    - config/symbols.txt
    - config/symbols_dget.txt
  reloc_addrs_path:
    - config/relocs_dget.txt

  undefined_funcs_auto_path: build/generated/undefined_funcs_auto_dget.txt
  undefined_syms_auto_path: build/generated/undefined_syms_auto_dget.txt

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  use_gp_rel_macro: True

segments:
  - name: header
    type: rodata
    start: 0x0
    vram: 0x80080800
    align: 4
    subalign: 4

  - name: dget
    type: code
    start: 0x40
    vram: 0x80080840
    align: 4
    subalign: 4
    subsegments:
      - [0x40, asm]
      - [0x14CC, data]

  - [0x14F8]
