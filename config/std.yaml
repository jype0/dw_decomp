options:
  basename: std
  target_path: disks/us/STD_REL.BIN
  base_path: ..
  platform: psx
  compiler: PSYQ

  asm_path: asm/std
  src_path: src/std
  build_path: build

  ld_script_path: build/generated/std.ld

  global_vram_start: 0x80000000
  global_vram_end: 0x80200000

  find_file_boundaries: True
  gp_value: 0x8013BB2C

  generate_asm_macros_files: False

  section_order: [".text", ".rodata", ".data", ".sdata", ".sbss", ".bss"]

  symbol_addrs_path:
    - config/symbols.txt
    - config/symbols_std.txt
  reloc_addrs_path:
    - config/relocs_std.txt

  undefined_funcs_auto_path: build/generated/undefined_funcs_auto_std.txt
  undefined_syms_auto_path: build/generated/undefined_syms_auto_std.txt

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  use_gp_rel_macro: True

