name: dooa
sha1: ace872836a57a708fef1bec45bf44af886b39f16
options:
  basename: dooa
  target_path: disks/us/DOOA_REL.BIN
  base_path: ..
  platform: psx
  compiler: PSYQ

  asm_path: asm/dooa
  src_path: src/dooa
  build_path: build

  ld_script_path: build/generated/dooa.ld

  global_vram_start: 0x80000000
  global_vram_end: 0x80200000

  find_file_boundaries: True
  gp_value: 0x8013BB2C

  generate_asm_macros_files: False

  section_order: [".text", ".rodata", ".data", ".sdata", ".sbss", ".bss"]

  symbol_addrs_path:
    - config/symbols.txt
    - config/symbols_dooa.txt
  reloc_addrs_path:
    - config/relocs_dooa.txt

  undefined_funcs_auto_path: build/generated/undefined_funcs_auto_dooa.txt
  undefined_syms_auto_path: build/generated/undefined_syms_auto_dooa.txt

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  use_gp_rel_macro: True

segments:
  - name: header
    type: rodata
    start: 0x0
    vram: 0x80080000
    align: 4
    subalign: 4

  - name: dooa
    type: code
    start: 0x40
    vram: 0x80080040
    align: 4
    subalign: 4
    subsegments:
      - [0x40, asm]
      - [0x48D4, data]

  - [0x78AC]
