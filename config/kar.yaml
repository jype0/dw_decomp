name: kar
sha1: 5da260cee3fe1aff875b8f1419c6f323232deff8
options:
  basename: kar
  target_path: disks/us/KAR_REL.BIN
  base_path: ..
  platform: psx
  compiler: PSYQ

  asm_path: asm/kar
  src_path: src/kar
  build_path: build

  ld_script_path: build/generated/kar.ld

  global_vram_start: 0x80000000
  global_vram_end: 0x80200000

  find_file_boundaries: True
  gp_value: 0x8013BB2C

  generate_asm_macros_files: False

  section_order: [".text", ".rodata", ".data", ".sdata", ".sbss", ".bss"]

  symbol_addrs_path:
    - config/symbols.txt
    - config/symbols_kar.txt
  reloc_addrs_path:
    - config/relocs_kar.txt

  undefined_funcs_auto_path: build/generated/undefined_funcs_auto_kar.txt
  undefined_syms_auto_path: build/generated/undefined_syms_auto_kar.txt

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

  use_gp_rel_macro: True

segments:
  - name: header
    type: rodata
    start: 0x0
    vram: 0x80053800
    align: 4
    subalign: 4

  - name: kar
    type: code
    start: 0x40
    vram: 0x80053840
    align: 4
    subalign: 4
    subsegments:
      - [0x40, asm]
      - [0x7310, data]

  - [0x101EC]
